# corpus-core is resolved from PyPI (>=0.2.0, includes U7/Group-A), pulled
# transitively by arxiv-radar-mcp. arxiv-radar-mcp itself is not on PyPI yet,
# so it is installed from git main; that step also drags in corpus-core 0.2.0
# from PyPI. When arxiv-radar-mcp releases to PyPI, drop the git-main step.
name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install arxiv-radar-mcp from git main (pulls corpus-core from PyPI)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "arxiv-radar-mcp @ git+https://github.com/exopoiesis/arxiv-radar-mcp@main"

      - name: Install package + dev extras
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src tests

      - name: Run pytest
        run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: lab-corpus-mcp-dist
          path: dist/
