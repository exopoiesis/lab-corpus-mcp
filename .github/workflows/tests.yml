# corpus-core and arxiv-radar-mcp are installed from git main because our
# U7/GroupA changes are not yet on PyPI. When both siblings release PyPI
# versions that include those changes, switch to pinned PyPI versions
# (e.g. "corpus-core>=0.2.0", "arxiv-radar-mcp>=0.1.0").
name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install siblings from git main (dependency order)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "corpus-core @ git+https://github.com/exopoiesis/corpus-core@main"
          python -m pip install "arxiv-radar-mcp @ git+https://github.com/exopoiesis/arxiv-radar-mcp@main"

      - name: Install package + dev extras
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src tests

      - name: Run pytest
        run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install siblings from git main (dependency order)
        run: |
          python -m pip install --upgrade pip build
          python -m pip install "corpus-core @ git+https://github.com/exopoiesis/corpus-core@main"
          python -m pip install "arxiv-radar-mcp @ git+https://github.com/exopoiesis/arxiv-radar-mcp@main"

      - name: Build sdist + wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: lab-corpus-mcp-dist
          path: dist/
